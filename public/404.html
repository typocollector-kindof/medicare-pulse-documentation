<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PULSE Design System</title>
  <script>
    // SPA redirect for GitHub Pages
    // Converts /medicare-pulse-documentation/some/path to /#/some/path
    var repo = '/medicare-pulse-documentation';
    var path = window.location.pathname.replace(repo, '');
    if (path && path !== '/') {
      window.location.replace(repo + '/#' + path + window.location.search);
    } else {
      window.location.replace(repo + '/');
    }
  </script>
</head>
<body></body>
</html>
